<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Boost Kids — Missing Shapes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shapes-shell">
    <header class="shape-topbar">
      <div>
        <h1>Missing Shapes</h1>
        <p>Find the shape, finish the pattern, and collect stars!</p>
      </div>
      <div class="shape-controls">
        <button id="soundToggle" class="icon-btn">🔊</button>
        <button id="hintButton" class="icon-btn">💡</button>
        <button id="restartButton" class="icon-btn">⟲</button>
        <button id="homeButton" class="icon-btn">🏠</button>
      </div>
    </header>

    <main class="shape-main">
      <section id="shapeHome" class="shape-screen active">
        <div class="shape-hero">
          <h2>Choose your challenge</h2>
          <p>Pick a puzzle and race through ten bright questions.</p>
          <div class="shape-choice-grid">
            <button class="shape-mode-btn active" data-mode="find_shape">Find the shape</button>
            <button class="shape-mode-btn" data-mode="pattern_match">Pattern match</button>
            <button class="shape-mode-btn" data-mode="count_shapes">Count the shapes</button>
          </div>
          <div class="difficulty-row">
            <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
          </div>
          <button id="startButton" class="primary-btn">Start Game</button>
        </div>
      </section>

      <section id="shapeGame" class="shape-screen">
        <div class="status-row">
          <div>
            <span>Score</span>
            <strong id="scoreLabel">0</strong>
          </div>
          <div>
            <span>Stars</span>
            <div id="starsDisplay" class="stars"></div>
          </div>
          <div>
            <span>Round</span>
            <strong id="roundLabel">1 / 10</strong>
          </div>
        </div>

        <div class="shape-question-card">
          <div id="promptText" class="shape-prompt">Loading your first puzzle...</div>
          <div id="shapePreview" class="shape-preview"></div>
        </div>

        <div id="answerGrid" class="shape-answers"></div>
        <div id="hintArea" class="shape-hint hidden"><strong>Hint:</strong> <span id="hintText"></span></div>
      </section>

      <section id="shapeResult" class="shape-screen">
        <div class="shape-celebrate">
          <h2 id="resultTitle">You did it!</h2>
          <p id="resultText">Bright thinking and sharp eyes won this round.</p>
          <div class="result-summary">
            <span id="finalScore">0</span>
            <span>points</span>
          </div>
          <div id="resultStars" class="stars"></div>
          <div class="result-buttons">
            <button id="playAgain" class="secondary-btn">Play Again</button>
            <button id="backHome" class="primary-btn">Back Home</button>
          </div>
        </div>
      </section>
    </main>

    <div id="confettiLayer" class="confetti-layer"></div>
  </div>
  <script src="script.js" defer></script>
</body>
</html>
